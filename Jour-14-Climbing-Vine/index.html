<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jour 14 — Climbing Vine · MathxCanvas</title>
  <style>body{margin:0;background:#050a05;overflow:hidden;touch-action:none;}canvas{display:block;}</style>
</head>
<body>
<canvas id="canvas1"></canvas>
<script>
  const canvas=document.getElementById('canvas1'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const vines=[];
  class Vine{
    constructor(x,y,angle,size){
      this.x=x;this.y=y;this.angle=angle;this.size=size;
      this.width=Math.random()*5+2;this.color=`hsl(${100+Math.random()*40},70%,${20+Math.random()*30}%)`;this.finished=false;
    }
    update(){
      if(this.finished)return;
      ctx.strokeStyle=this.color;ctx.lineWidth=this.width;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(this.x,this.y);
      this.angle+=(Math.random()-0.5)*0.2;
      this.x+=Math.cos(this.angle)*this.size;this.y+=Math.sin(this.angle)*this.size;
      ctx.lineTo(this.x,this.y);ctx.stroke();
      this.width*=0.98;if(this.width<0.5)this.finished=true;
      if(Math.random()>0.95&&this.width>2)vines.push(new Vine(this.x,this.y,this.angle+0.5,this.size*0.9));
    }
  }
  function spawn(x,y){if(Math.random()>0.8)vines.push(new Vine(x,y,Math.random()*Math.PI*2,Math.random()*5+2));}
  window.addEventListener('mousemove',(e)=>spawn(e.x,e.y));
  window.addEventListener('touchmove',(e)=>{e.preventDefault();spawn(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  function animate(){vines.forEach(v=>v.update());requestAnimationFrame(animate);}
  animate();
</script>
</body></html>
