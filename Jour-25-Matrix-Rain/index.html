<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jour 25 — Matrix Rain · MathxCanvas</title>
  <style>body{margin:0;background:#000;overflow:hidden;touch-action:none;}canvas{display:block;}</style>
</head>
<body>
<canvas id="canvas1"></canvas>
<script>
  const canvas=document.getElementById('canvas1'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const characters="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}[]<>^~";
  const fontSize=16,columns=canvas.width/fontSize;
  const drops=Array(Math.floor(columns)).fill(1);
  const mouse={x:-100,y:-100};
  function setPointer(x,y){mouse.x=x;mouse.y=y;}
  window.addEventListener('mousemove',(e)=>setPointer(e.x,e.y));
  window.addEventListener('touchmove',(e)=>{e.preventDefault();setPointer(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.font=fontSize+"px monospace";
    for(let i=0;i<drops.length;i++){
      const x=i*fontSize,y=drops[i]*fontSize;
      const dist=Math.sqrt(Math.pow(mouse.x-x,2)+Math.pow(mouse.y-y,2));
      ctx.fillStyle=dist<100?"#fff":"#0f0";
      ctx.fillText(characters.charAt(Math.floor(Math.random()*characters.length)),x,y);
      if(y>canvas.height&&Math.random()>0.975)drops[i]=0;
      drops[i]+=(dist<150)?2:1;
    }
  }
  setInterval(draw,33);
</script>
</body></html>
