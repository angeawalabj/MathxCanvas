<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jour 11 — Gravity Bounce · MathxCanvas</title>
  <style>body{margin:0;background:#0a0a0f;overflow:hidden;touch-action:none;}canvas{display:block;}</style>
</head>
<body>
<canvas id="canvas1"></canvas>
<script>
  const canvas=document.getElementById('canvas1'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const balls=[],mouse={x:null,y:null,active:false};
  function setPointer(x,y){mouse.x=x;mouse.y=y;mouse.active=true;}
  window.addEventListener('mousemove',(e)=>setPointer(e.x,e.y));
  window.addEventListener('touchmove',(e)=>{e.preventDefault();setPointer(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  window.addEventListener('touchend',()=>{mouse.active=false;});
  class Ball{
    constructor(){
      this.radius=Math.random()*15+5;
      this.x=Math.random()*(canvas.width-this.radius*2)+this.radius;
      this.y=Math.random()*(canvas.height-this.radius*2)+this.radius;
      this.vx=(Math.random()-0.5)*10;this.vy=(Math.random()-0.5)*10;
      this.color=`hsl(${Math.random()*360},70%,60%)`;
    }
    update(){
      if(this.x+this.radius>canvas.width||this.x-this.radius<0)this.vx*=-1;
      if(this.y+this.radius>canvas.height||this.y-this.radius<0)this.vy*=-1;
      if(mouse.active){
        let dx=mouse.x-this.x,dy=mouse.y-this.y,distance=Math.sqrt(dx*dx+dy*dy);
        if(distance<200){let force=(200-distance)/200;this.vx-=(dx/distance)*force*1.5;this.vy-=(dy/distance)*force*1.5;}
      }
      this.x+=this.vx;this.y+=this.vy;this.vx*=0.99;this.vy*=0.99;
      ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fillStyle=this.color;ctx.fill();
    }
  }
  for(let i=0;i<50;i++)balls.push(new Ball());
  function animate(){
    ctx.fillStyle='rgba(10,10,15,0.3)';ctx.fillRect(0,0,canvas.width,canvas.height);
    balls.forEach(b=>b.update());requestAnimationFrame(animate);
  }
  animate();
</script>
</body></html>
