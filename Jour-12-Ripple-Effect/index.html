<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jour 12 — Ripple Effect · MathxCanvas</title>
  <style>body{margin:0;background:#050505;overflow:hidden;touch-action:none;}canvas{display:block;}</style>
</head>
<body>
<canvas id="canvas1"></canvas>
<script>
  const canvas=document.getElementById('canvas1'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  let dots=[],ripple={x:0,y:0,r:0,active:false};
  const spacing=20;
  class Dot{
    constructor(x,y){this.baseX=x;this.baseY=y;this.x=x;this.y=y;}
    draw(){ctx.fillStyle='#00d4ff';ctx.beginPath();ctx.arc(this.x,this.y,1.5,0,Math.PI*2);ctx.fill();}
    update(){
      if(ripple.active){
        let dx=this.x-ripple.x,dy=this.y-ripple.y,distance=Math.sqrt(dx*dx+dy*dy);
        let diff=distance-ripple.r;
        if(diff<50&&diff>-50){let force=(50-Math.abs(diff))/50;this.x+=(dx/distance)*force*20;this.y+=(dy/distance)*force*20;}
      }
      this.x+=(this.baseX-this.x)*0.1;this.y+=(this.baseY-this.y)*0.1;
    }
  }
  function init(){for(let y=0;y<canvas.height;y+=spacing)for(let x=0;x<canvas.width;x+=spacing)dots.push(new Dot(x,y));}
  function trigger(x,y){ripple.x=x;ripple.y=y;ripple.r=0;ripple.active=true;}
  window.addEventListener('mousedown',(e)=>trigger(e.x,e.y));
  window.addEventListener('touchstart',(e)=>{e.preventDefault();trigger(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  function animate(){
    ctx.fillStyle='rgba(5,5,5,0.2)';ctx.fillRect(0,0,canvas.width,canvas.height);
    if(ripple.active){ripple.r+=10;if(ripple.r>canvas.width)ripple.active=false;}
    dots.forEach(d=>{d.update();d.draw();});requestAnimationFrame(animate);
  }
  init();animate();
</script>
</body></html>
