<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jour 19 — Kaleidoscope · MathxCanvas</title>
  <style>body{margin:0;background:#050505;overflow:hidden;touch-action:none;}canvas{display:block;}</style>
</head>
<body>
<canvas id="canvas1"></canvas>
<script>
  const canvas=document.getElementById('canvas1'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  let isDrawing=false;
  const slices=36;

  function draw(x,y){
    const centerX=canvas.width/2,centerY=canvas.height/2;
    ctx.save();ctx.translate(centerX,centerY);
    for(let i=0;i<slices;i++){
      ctx.rotate((Math.PI*2)/slices);
      ctx.beginPath();ctx.arc(x-centerX,y-centerY,5,0,Math.PI*2);
      ctx.fillStyle=`hsl(${(x+y)%360},100%,50%)`;ctx.fill();
      ctx.save();ctx.scale(1,-1);
      ctx.beginPath();ctx.arc(x-centerX,y-centerY,5,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  window.addEventListener('mousedown',()=>isDrawing=true);
  window.addEventListener('mouseup',()=>isDrawing=false);
  window.addEventListener('mousemove',(e)=>{if(isDrawing)draw(e.x,e.y);});
  window.addEventListener('touchstart',(e)=>{e.preventDefault();isDrawing=true;},{passive:false});
  window.addEventListener('touchend',()=>isDrawing=false);
  window.addEventListener('touchmove',(e)=>{e.preventDefault();if(isDrawing)draw(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  window.addEventListener('contextmenu',(e)=>{e.preventDefault();ctx.clearRect(0,0,canvas.width,canvas.height);});
</script>
</body></html>
