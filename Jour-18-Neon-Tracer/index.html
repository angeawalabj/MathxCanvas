<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jour 18 — Neon Tracer · MathxCanvas</title>
  <style>body{margin:0;background:#000;overflow:hidden;touch-action:none;}canvas{display:block;}</style>
</head>
<body>
<canvas id="canvas1"></canvas>
<script>
  const canvas=document.getElementById('canvas1'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  let lastX=0,lastY=0,speed=0;

  function drawNeon(x1,y1,x2,y2,velocity){
    ctx.beginPath();
    const width=Math.max(2,25-velocity);
    ctx.lineWidth=width;ctx.lineCap='round';
    ctx.shadowBlur=15;ctx.shadowColor='#00f2ff';ctx.strokeStyle='#fff';
    ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.closePath();
  }

  function move(x,y){
    const dx=x-lastX,dy=y-lastY;
    speed=Math.sqrt(dx*dx+dy*dy);
    drawNeon(lastX,lastY,x,y,speed);
    lastX=x;lastY=y;
  }

  window.addEventListener('mousemove',(e)=>move(e.x,e.y));
  window.addEventListener('touchmove',(e)=>{e.preventDefault();move(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  window.addEventListener('touchstart',(e)=>{lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;},{passive:false});

  function fade(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);requestAnimationFrame(fade);}
  fade();
</script>
</body></html>
