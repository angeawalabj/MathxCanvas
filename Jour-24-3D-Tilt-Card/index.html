<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jour 24 — 3D Tilt Card · MathxCanvas</title>
  <style>
    body{margin:0;background:#0a0a0a;height:100vh;display:flex;align-items:center;justify-content:center;perspective:1000px;font-family:'Segoe UI',sans-serif;touch-action:none;}
    .card{width:300px;height:400px;background:linear-gradient(135deg,#1e1e1e,#111);border-radius:20px;border:1px solid rgba(255,255,255,0.1);position:relative;transform-style:preserve-3d;transition:transform 0.1s ease-out;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 20px 50px rgba(0,0,0,0.5);}
    .card-content{transform:translateZ(50px);color:white;text-align:center;pointer-events:none;}
    .card::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at var(--x) var(--y),rgba(255,255,255,0.15),transparent);border-radius:20px;pointer-events:none;}
  </style>
</head>
<body>
  <div class="card" id="tiltCard">
    <div class="card-content"><h2 style="font-size:40px;margin:0">3D</h2><p style="opacity:0.5">MOVE / TOUCH</p></div>
  </div>
  <script>
    const card=document.getElementById('tiltCard');
    function tilt(clientX,clientY){
      const rect=card.getBoundingClientRect();
      const x=clientX-rect.left,y=clientY-rect.top;
      card.style.transform=`rotateX(${(rect.height/2-y)/10}deg) rotateY(${(x-rect.width/2)/10}deg)`;
      card.style.setProperty('--x',`${x}px`);card.style.setProperty('--y',`${y}px`);
    }
    window.addEventListener('mousemove',(e)=>tilt(e.clientX,e.clientY));
    window.addEventListener('mouseout',()=>card.style.transform='rotateX(0deg) rotateY(0deg)');
    window.addEventListener('touchmove',(e)=>{e.preventDefault();tilt(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    window.addEventListener('touchend',()=>card.style.transform='rotateX(0deg) rotateY(0deg)');
  </script>
</body></html>
