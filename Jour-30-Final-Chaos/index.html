<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jour 30 — Final Chaos · MathxCanvas</title>
  <style>body{margin:0;background:#000;overflow:hidden;touch-action:none;}canvas{display:block;}</style>
</head>
<body>
<canvas id="canvas1"></canvas>
<script>
  const canvas=document.getElementById('canvas1'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const particles=[],mouse={x:canvas.width/2,y:canvas.height/2,active:false};
  function setPointer(x,y){mouse.x=x;mouse.y=y;}
  window.addEventListener('mousemove',(e)=>{setPointer(e.x,e.y);mouse.active=true;});
  window.addEventListener('mousedown',()=>mouse.active=!mouse.active);
  window.addEventListener('touchmove',(e)=>{e.preventDefault();setPointer(e.touches[0].clientX,e.touches[0].clientY);mouse.active=true;},{passive:false});
  window.addEventListener('touchstart',(e)=>{e.preventDefault();mouse.active=!mouse.active;},{passive:false});
  class Particle{
    constructor(){
      this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;
      this.vx=(Math.random()-0.5)*2;this.vy=(Math.random()-0.5)*2;
      this.accX=0;this.accY=0;this.friction=0.96;
      this.color=`hsl(${Math.random()*40+190},80%,60%)`;
    }
    update(){
      if(mouse.active){let dx=mouse.x-this.x,dy=mouse.y-this.y,distance=Math.sqrt(dx*dx+dy*dy);let force=1000/distance;this.accX=(dx/distance)*force;this.accY=(dy/distance)*force;}
      else{this.accX=(Math.random()-0.5)*0.5;this.accY=(Math.random()-0.5)*0.5;}
      this.vx+=this.accX;this.vy+=this.accY;this.vx*=this.friction;this.vy*=this.friction;this.x+=this.vx;this.y+=this.vy;
    }
    draw(){ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,1.5,0,Math.PI*2);ctx.fill();}
  }
  for(let i=0;i<2000;i++)particles.push(new Particle());
  function animate(){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animate);}
  animate();
</script>
</body></html>
